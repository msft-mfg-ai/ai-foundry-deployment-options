# pytest.ini — matches the ai-gateway-quota / Komatsu harness defaults.
[pytest]
addopts = -v -s --tb=short -ra
testpaths = .
python_files = test_*.py
asyncio_mode = auto
markers =
    quota: requires gateway deployed in quota mode (/ai-gateway/config.json). Auto-skipped in open mode.
    foundry: requires a Foundry project endpoint with an ApiManagement-type connection.
    realtime: requires a *realtime* model deployment routed through the gateway.
