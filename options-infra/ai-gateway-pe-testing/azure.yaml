# deploying using AZD because https://github.com/Azure/azure-cli/pull/31990
name: foundry-byom-testing

infra:
  provider: bicep
  path: .
  module: main

hooks:
  preprovision:
    windows:
      shell: pwsh
      run: |
        & '../scripts/preprovision-list-foundry-models.ps1'
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        if (-not $env:MY_IP) {
          $ip = (Invoke-RestMethod https://api.ipify.org).Trim()
          Write-Host "Auto-detected MY_IP=$ip (set MY_IP explicitly to override)"
          azd env set MY_IP $ip
        } else {
          Write-Host "Using MY_IP=$env:MY_IP from azd env"
        }
      interactive: false
      continueOnError: false
    posix:
      shell: sh
      run: |
        set -eu
        sh ../scripts/preprovision-list-foundry-models.sh
        if [ -z "${MY_IP:-}" ]; then
          ip=$(curl -sf https://api.ipify.org)
          echo "Auto-detected MY_IP=${ip} (set MY_IP explicitly to override)"
          azd env set MY_IP "${ip}"
        else
          echo "Using MY_IP=${MY_IP} from azd env"
        fi
      interactive: false
      continueOnError: false

  postprovision:
    posix:
      shell: sh
      run: |
        set -eu
        MY_OID=$(az ad signed-in-user show --query id -o tsv)
        SEARCH_ID=$(az search service show --name "${AI_SEARCH_SERVICE_NAME}" --resource-group "${AZURE_RESOURCE_GROUP}" --query id -o tsv)

        echo "── Setting AI Search firewall to allow only MY_IP=${MY_IP} + granting Data Contributor to ${MY_OID} ──"
        az search service update \
          --name "${AI_SEARCH_SERVICE_NAME}" \
          --resource-group "${AZURE_RESOURCE_GROUP}" \
          --public-access enabled \
          --ip-rules "${MY_IP}" \
          --output none
        az role assignment create --role "Search Service Contributor" --assignee-object-id "${MY_OID}" --assignee-principal-type User --scope "${SEARCH_ID}" --output none 2>/dev/null || true
        az role assignment create --role "Search Index Data Contributor" --assignee-object-id "${MY_OID}" --assignee-principal-type User --scope "${SEARCH_ID}" --output none 2>/dev/null || true
        echo "  waiting 30s for RBAC to propagate…"
        sleep 30
        # Wait for API to become reachable.
        for i in $(seq 1 30); do
          code=$(curl -s -o /dev/null -w '%{http_code}' "${AI_SEARCH_ENDPOINT}/indexes?api-version=2024-07-01" || true)
          if [ "$code" = "200" ] || [ "$code" = "401" ] || [ "$code" = "403" ]; then break; fi
          echo "  waiting for search API… ($i/30)"
          sleep 5
        done
        cd scripts
        uv sync
        uv run python create_index.py --endpoint "${AI_SEARCH_ENDPOINT}" --index "${AZURE_AI_SEARCH_INDEX_NAME}"
        cd -
        # NOTE: AI Search firewall is intentionally LEFT OPEN to MY_IP so that
        # subsequent index CRUD (portal, azd re-runs, tests) works without a
        # firewall dance. All other IPs are still denied.

        echo "── Building + pushing hosted-agent image to ${AZURE_CONTAINER_REGISTRY_NAME} (via MY_IP=${MY_IP}) ──"
        az acr build \
          --registry "${AZURE_CONTAINER_REGISTRY_NAME}" \
          --image byom-hosted-agent:latest \
          --file services/hosted-agent/Dockerfile \
          services/hosted-agent \
          --output none

        echo "── Done. Paste these into the byom GH Environment: ──"
        echo "PROJECT_ENDPOINT=${PROJECT_ENDPOINT}"
        echo "AI_GATEWAY_CONNECTION_STATIC=${AI_GATEWAY_CONNECTION_STATIC}"
        echo "AI_GATEWAY_CONNECTION_DYNAMIC=${AI_GATEWAY_CONNECTION_DYNAMIC}"
        echo "BING_CONNECTION_ID=${BING_CONNECTION_ID}"
        echo "AZURE_AI_SEARCH_CONNECTION_ID=${AZURE_AI_SEARCH_CONNECTION_ID}"
        echo "AZURE_AI_SEARCH_INDEX_NAME=${AZURE_AI_SEARCH_INDEX_NAME}"
        echo "FOUNDRY_NAME=${FOUNDRY_NAME}"
        echo "RESOURCE_GROUP=${RESOURCE_GROUP}"
        echo "AZURE_CONTAINER_REGISTRY_NAME=${AZURE_CONTAINER_REGISTRY_NAME}"
        echo "AZURE_CONTAINER_REGISTRY_ENDPOINT=${AZURE_CONTAINER_REGISTRY_ENDPOINT}"
        echo "HOSTED_AGENT_IMAGE=${HOSTED_AGENT_IMAGE}"
      interactive: false
      continueOnError: false
    windows:
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $MY_OID = az ad signed-in-user show --query id -o tsv
        $SEARCH_ID = az search service show --name $env:AI_SEARCH_SERVICE_NAME --resource-group $env:AZURE_RESOURCE_GROUP --query id -o tsv

        Write-Host "── Setting AI Search firewall to allow only MY_IP=$env:MY_IP + granting Data Contributor to $MY_OID ──"
        az search service update --name $env:AI_SEARCH_SERVICE_NAME --resource-group $env:AZURE_RESOURCE_GROUP --public-access enabled --ip-rules $env:MY_IP --output none
        az role assignment create --role "Search Service Contributor" --assignee-object-id $MY_OID --assignee-principal-type User --scope $SEARCH_ID --output none 2>$null
        az role assignment create --role "Search Index Data Contributor" --assignee-object-id $MY_OID --assignee-principal-type User --scope $SEARCH_ID --output none 2>$null
        Write-Host "  waiting 30s for RBAC to propagate…"
        Start-Sleep -Seconds 30
        for ($i = 1; $i -le 30; $i++) {
          try {
            $r = Invoke-WebRequest -Uri "$($env:AI_SEARCH_ENDPOINT)/indexes?api-version=2024-07-01" -Method Get -UseBasicParsing -ErrorAction Stop
            if ($r.StatusCode -in 200, 401, 403) { break }
          } catch {
            if ($_.Exception.Response.StatusCode.value__ -in 200, 401, 403) { break }
            Write-Host "  waiting for search API… ($i/30)"
            Start-Sleep -Seconds 5
          }
        }
        Push-Location scripts
        uv sync
        uv run python create_index.py --endpoint $env:AI_SEARCH_ENDPOINT --index $env:AZURE_AI_SEARCH_INDEX_NAME
        Pop-Location
        # AI Search firewall is intentionally LEFT OPEN to MY_IP (not closed).

        Write-Host "── Building + pushing hosted-agent image to $env:AZURE_CONTAINER_REGISTRY_NAME (via MY_IP=$env:MY_IP) ──"
        az acr build `
          --registry $env:AZURE_CONTAINER_REGISTRY_NAME `
          --image byom-hosted-agent:latest `
          --file services/hosted-agent/Dockerfile `
          services/hosted-agent `
          --output none
      interactive: false
      continueOnError: false
