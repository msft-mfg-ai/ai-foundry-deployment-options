# BYOM canary hosted agent.
#
# Long-lived Foundry Hosted Agent that runs a small BYOM probe matrix against
# the APIM AI Gateway connection from *inside* the hosted-agent container.
# Provisioned by `azd deploy` via the azure.ai.agents extension.
name: byom-canary
description: >
  Canary hosted agent that exercises BYOM (AI Gateway / APIM) routing from
  within a Foundry-hosted container using the "{connection}/{model}" convention.
metadata:
  tags:
    - byom
    - ai-gateway
    - canary

template:
  name: byom-canary
  kind: hosted
  protocols:
    - protocol: invocations
      version: 1.0.0
  environment_variables:
    # BYOM convention: pass gateway+model as a single "{connection}/{model}" string.
    - name: BYOM_MODEL
      value: ${AI_GATEWAY_CONNECTION_STATIC}/${CHAT_MODEL}
    - name: BYOM_MODEL_ANTHROPIC
      value: ${AI_GATEWAY_CONNECTION_ANTHROPIC}/${ANTHROPIC_MODEL}
    # AZURE_AI_PROJECT_ENDPOINT is auto-injected by the platform.
