# deploying using AZD because https://github.com/Azure/azure-cli/pull/31990
name: ai-gateway-litellm-cert

infra:
  provider: bicep
  path: .
  module: main

hooks:
  # Preprovision: generate a self-signed root CA + leaf cert for LITELLM_DOMAIN
  # and write the cert material (PFX + PEM + key + CA) into the azd env so
  # main.bicepparam can pick it up via readEnvironmentVariable. Idempotent —
  # re-runs reuse the existing cert unless FORCE_REGENERATE=1.
  preprovision:
    windows:
      shell: pwsh
      run: |
        & '../scripts/preprovision-litellm-cert.ps1'
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      interactive: true
      continueOnError: false
    posix:
      shell: sh
      run: |
        sh ../scripts/preprovision-litellm-cert.sh
      interactive: true
      continueOnError: false

  postup:
    windows:
      shell: pwsh
      run: |
        Write-Host ""
        Write-Host "🎉 ========================================== 🎉"
        Write-Host "✅ LiteLLM setup deployed successfully!"
        Write-Host "🎉 ========================================== 🎉"
        Write-Host ""
        Write-Host "🌐 Access LiteLLM:"
        Write-Host "   👉 $env:LITELLM_UI_URL"
        Write-Host ""
        Write-Host "📚 Access LiteLLM Swagger Documentation:"
        Write-Host "   👉 $env:LITELLM_SWAGGER_URL"
        Write-Host ""
        Write-Host "🚀 Happy coding!"
        Write-Host ""
      interactive: true
      continueOnError: false
    posix:
      shell: sh
      run: |
        echo ""
        echo "🎉 ========================================== 🎉"
        echo "✅ LiteLLM setup deployed successfully!"
        echo "🎉 ========================================== 🎉"
        echo ""
        echo "🌐 Access LiteLLM:"
        echo "   👉 ${LITELLM_UI_URL} using ${LITELLM_KEY}"
        echo ""
        echo "📚 Access LiteLLM Swagger Documentation:"
        echo "   👉 ${LITELLM_SWAGGER_URL}"
        echo ""
        echo "🚀 Happy coding!"
        echo ""
      interactive: true
      continueOnError: false