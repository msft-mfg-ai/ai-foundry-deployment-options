name: ai-gateway-anthropic

infra:
  provider: bicep
  path: .
  module: main

hooks:
  preprovision:
    windows:
      shell: pwsh
      run: |
        & '../scripts/preprovision-list-foundry-models.ps1'
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      interactive: false
      continueOnError: false
    posix:
      shell: sh
      run: |
        sh ../scripts/preprovision-list-foundry-models.sh
      interactive: false
      continueOnError: false

  postprovision:
    shell: sh
    run: |
      echo "Provisioning complete!"
      echo "📍 Foundry Name: ${FOUNDRY_NAME}"
      echo "🤖 Project Connections: ${FOUNDRY_PROJECTS_CONNECTION_STRINGS}"
      echo "🌐 Anthropic Inference URL: ${ANTHROPIC_INFERENCE_URL}"
